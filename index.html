<!DOCTYPE html>
<html>
<head>
  <title>FitPilot AI</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>💪 FitPilot</h2>

    <button onclick="showSection('plan')">🏠 Plan</button>
    <button onclick="showSection('checkin')">✅ Check-in</button>
    <button onclick="showSection('progress')">📊 Progress</button>
  </div>

  <!-- Main -->
  <div class="main">

    <h1>AI Fitness Coach</h1>

    <!-- PLAN -->
    <div id="plan" class="section active">

      <div class="card form">
        <h3>Your Profile</h3>

        <input id="age" placeholder="Age">
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <input id="weight" placeholder="Weight (kg)">
        <select id="diet">
          <option value="veg">Vegetarian</option>
          <option value="non-veg">Non-Vegetarian</option>
        </select>

        <input id="goal" placeholder="Goal">

        <button onclick="generate()">Generate Plan</button>
      </div>

      <div id="planOutput" class="grid"></div>

    </div>

    <!-- CHECKIN -->
    <div id="checkin" class="section">
      <div class="card">
        <h3>Daily Check-in</h3>

        <button onclick="checkin(true)">✔ Followed</button>
        <button onclick="checkin(false)">❌ Missed</button>
      </div>
    </div>

    <!-- PROGRESS -->
    <div id="progress" class="section">
      <div class="card">
        <h3>Progress Dashboard</h3>

        <button onclick="loadProgress()">Refresh</button>

        <div id="stats"></div>
        <canvas id="chart"></canvas>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
